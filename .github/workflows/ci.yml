name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [develop]

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_USDC_MINT: ${{ secrets.NEXT_PUBLIC_USDC_MINT }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm build
