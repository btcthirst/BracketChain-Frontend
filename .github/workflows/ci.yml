name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [develop]

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_USDC_MINT: ${{ secrets.NEXT_PUBLIC_USDC_MINT }}
      # Baked into the client bundle at build time; PrivyProvider throws on an
      # empty/invalid id while prerendering /_not-found. Public value, but kept
      # in secrets to mirror USDC_MINT.
      NEXT_PUBLIC_PRIVY_APP_ID: ${{ secrets.NEXT_PUBLIC_PRIVY_APP_ID }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm build
