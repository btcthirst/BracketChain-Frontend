name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [develop]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: "npm"

      - run: npm ci

      - run: npm run lint

      - run: npm run build
